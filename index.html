<style>
*{box-sizing:border-box;margin:0;padding:0;}
body,#ig-root{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#ig-root{min-height:100vh;background:#F7F7F5;display:flex;justify-content:center;padding:40px 16px;}
.ig-card{background:#fff;border-radius:16px;border:1px solid #E8E8E4;padding:40px;width:100%;max-width:540px;height:fit-content;}
.ig-badge{display:inline-flex;align-items:center;gap:6px;background:#F0FDF4;color:#16A34A;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:16px;}
.ig-badge-dot{width:6px;height:6px;border-radius:50%;background:#16A34A;}
.ig-title{font-size:24px;font-weight:700;color:#111;margin-bottom:4px;letter-spacing:-0.3px;}
.ig-sub{font-size:13px;color:#888;margin-bottom:32px;}
.ig-divider{border:none;border-top:1px solid #F0F0EE;margin:24px 0;}
.ig-section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#AAA;margin-bottom:12px;}
.ig-field{display:flex;flex-direction:column;gap:5px;}
.ig-field label{font-size:12px;font-weight:500;color:#555;display:flex;align-items:center;gap:6px;}
.ig-field label span.opt{font-size:11px;font-weight:400;color:#BBB;font-style:italic;}
.ig-input{border:1.5px solid #E8E8E4;border-radius:10px;padding:10px 13px;font-size:14px;color:#111;background:#FAFAF9;font-family:inherit;outline:none;width:100%;transition:border-color .15s;}
.ig-input:focus{border-color:#111;background:#fff;}
.ig-input::placeholder{color:#C0C0BC;}
.ig-select{border:1.5px solid #E8E8E4;border-radius:10px;padding:10px 13px;font-size:14px;color:#111;background:#FAFAF9;font-family:inherit;outline:none;cursor:pointer;width:100%;}
.ig-row{display:flex;gap:12px;}.ig-row>*{flex:1;}.ig-row>.flex2{flex:2;}
.ig-stack{display:flex;flex-direction:column;gap:12px;}
.ig-co-btn{background:#FAFAF9;border:1.5px solid #E8E8E4;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:2px;width:100%;transition:all .15s;}
.ig-co-btn:hover{border-color:#CCC;}
.ig-co-btn.active{border-color:#111;background:#fff;box-shadow:0 0 0 3px rgba(0,0,0,0.04);}
.ig-co-name{font-size:13px;font-weight:600;color:#111;}.ig-co-sub{font-size:12px;color:#999;}
.ig-preview{margin-top:10px;padding:12px 14px;background:#FAFAF9;border-radius:10px;border-left:3px solid #E0E0DC;}
.ig-preview-line{font-size:12px;color:#666;line-height:1.7;}
.ig-total-bar{display:none;align-items:center;justify-content:space-between;background:#111;border-radius:12px;padding:16px 20px;margin-top:4px;}
.ig-total-bar.visible{display:flex;}
.ig-total-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#888;}
.ig-total-value{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px;}
.ig-gen-btn{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:16px;}
.ig-gen-btn:hover:not(:disabled){background:#222;transform:translateY(-1px);}
.ig-gen-btn:disabled{background:#DDD;color:#999;cursor:not-allowed;transform:none;}
.ig-pdf-wrap{width:100%;max-width:900px;display:flex;flex-direction:column;border-radius:16px;overflow:hidden;border:1px solid #E8E8E4;}
.ig-pdf-bar{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:18px 24px;border-bottom:1px solid #F0F0EE;}
.ig-pdf-title{font-size:15px;font-weight:700;color:#111;}.ig-pdf-sub{font-size:12px;color:#999;margin-top:2px;}
.ig-pdf-actions{display:flex;gap:10px;align-items:center;}
.ig-back-btn{background:none;border:1.5px solid #E8E8E4;color:#555;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .15s;}
.ig-back-btn:hover{border-color:#999;color:#111;}
.ig-dl-btn{background:#111;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:background .15s;}
.ig-dl-btn:hover{background:#333;}
iframe.ig-frame{width:100%;height:80vh;border:none;background:#fff;}
.ig-kz-section{background:#FAFAF9;border:1.5px solid #E8E8E4;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px;}
.ig-kz-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#888;margin-bottom:2px;}
.ig-loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
.ig-spinner{width:28px;height:28px;border:3px solid #E8E8E4;border-top-color:#111;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ig-drop{border:2px dashed #D0D0CC;border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:24px;background:#FAFAF9;}
.ig-drop:hover,.ig-drop.over{border-color:#111;background:#F0F0EE;}
.ig-drop-icon{font-size:28px;margin-bottom:8px;opacity:0.5;}
.ig-drop-text{font-size:13px;color:#888;line-height:1.5;}.ig-drop-text strong{color:#555;}
.ig-drop-input{display:none;}
.ig-drop-parsing{display:flex;align-items:center;gap:10px;justify-content:center;padding:20px;}
.ig-drop-parsing .ig-spinner{width:20px;height:20px;}
.ig-drop-ok{background:#F0FDF4;border-color:#86EFAC;padding:14px;font-size:13px;color:#16A34A;font-weight:500;}
.ig-drop-err{background:#FEF2F2;border-color:#FCA5A5;padding:14px;font-size:13px;color:#DC2626;font-weight:500;}
</style>
</head>

function parseFile(file){var ext=file.name.toLowerCase().split(".").pop();if(["pdf","png","jpg","jpeg","webp"].indexOf(ext)===-1){S._dropState="error";S._dropMsg="Unsupported file. Use PDF, PNG, or JPG.";ren();return;}S._dropState="parsing";S._dropMsg=file.name;ren();var fd=new FormData();fd.append("file",file);fetch(API_URL+"/parse-invoice",{method:"POST",body:fd}).then(function(r){if(!r.ok)return r.json().then(function(d){throw new Error(d.error||"Server error "+r.status);});return r.json();}).then(function(d){var fields=["fromName","fromAddress","fromCountry","fromEmail","fromTaxId","paymentMethod","paymentDetails","kzBankHolder","kzCpEmail","kzCpAddress","kzBankAddress","kzBankCountry","kzAccount","kzBinIin","kzBenefName","kzKbe","kzKnp","kzPurpose","companyId","description","quantity","unitCost","currency","day","month","year"];fields.forEach(function(k){if(d[k]!==undefined&&d[k]!=="")S[k]=d[k];});S._dropState="ok";S._dropMsg="Parsed: "+file.name;ren();}).catch(function(e){console.error("Parse error:",e);S._dropState="error";S._dropMsg=e.message||"Failed to parse invoice";ren();});}

);var bW=155,bH=40,bX=IX-bW,bY=78;doc.setFillColor(D[0],D[1],D[2]);doc.roundedRect(bX,bY,bW,bH,6,6,"F");doc.setFontSize(8).setTextColor(180,180,175);doc.text("AMOUNT DUE",bX+10,bY+16);doc.setFont(F,"bold").setFontSize(16).setTextColor(255,255,255);doc.text(total,bX+10,bY+34);var dY=hH+8;doc.setDrawColor(G[0],G[1],G[2]).setLineWidth(1);doc.line(C1,dY,W-40,dY);autoTable(doc,{startY:dY+10,margin:{left:C1,right:40},head:[["#","Description","Qty","Unit Cost","Total"]],body:[[1,S.description,S.quantity,uf,total]],headStyles:{fillColor:G,textColor:M,fontStyle:"bold",fontSize:8,cellPadding:8,font:F},bodyStyles:{textColor:D,fontSize:9,lineColor:G,lineWidth:0.5,cellPadding:8,font:F},alternateRowStyles:{fillColor:[255,255,255]},columnStyles:{0:{cellWidth:30,halign:"center"},2:{cellWidth:45,halign:"right"},3:{cellWidth:72,halign:"right"},4:{cellWidth:72,halign:"right"}},theme:"grid",tableLineColor:G,tableLineWidth:0.5});var ay=doc.lastAutoTable.finalY+20,TW=200,TX=W-40-TW;doc.setFillColor(L[0],L[1],L[2]);doc.roundedRect(TX-8,ay-6,TW+8,82,6,6,"F");autoTable(doc,{startY:ay,margin:{left:TX,right:40},tableWidth:TW,body:[["Subtotal",total],["Tax (0%)",S.currency+"0.00"]],foot:[["Total",total]],bodyStyles:{textColor:M,fontSize:9,lineWidth:0,cellPadding:{top:5,bottom:5,left:6,right:6},font:F},footStyles:{textColor:D,fontStyle:"bold",fontSize:10,lineWidth:0,fillColor:false,cellPadding:{top:7,bottom:5,left:6,right:6},font:F},columnStyles:{0:{cellWidth:110,halign:"left"},1:{cellWidth:90,halign:"right"}},didParseCell:function(data){if(data.column.index===1)data.cell.styles.halign="right";},didDrawCell:function(data){if(data.section==="foot"&&data.column.index===0&&data.row.index===0){data.doc.setDrawColor(G[0],G[1],G[2]);data.doc.setLineWidth(0.5);data.doc.line(TX,data.cell.y,TX+TW,data.cell.y);}},theme:"plain"});return doc;}

function dropZone(){if(S._dropState==="parsing"){return "<div class='ig-drop ig-drop-parsing'><div class='ig-spinner'></div><span style='font-size:13px;color:#888;'>Parsing "+esc(S._dropMsg)+"...</span></div>";}if(S._dropState==="ok"){return "<div class='ig-drop ig-drop-ok' onclick='triggerUpload()'>\u2705 "+esc(S._dropMsg)+" \u2014 fields filled. Drop another to re-parse.<input type='file' id='ig-file-input' class='ig-drop-input' accept='.pdf,.png,.jpg,.jpeg,.webp' onchange='handleFileChange(this)'></div>";}if(S._dropState==="error"){return "<div class='ig-drop ig-drop-err' onclick='triggerUpload()'>\u274c "+esc(S._dropMsg)+"<br><span style='font-weight:400;font-size:12px;'>Click or drop to try again</span><input type='file' id='ig-file-input' class='ig-drop-input' accept='.pdf,.png,.jpg,.jpeg,.webp' onchange='handleFileChange(this)'></div>";}return "<div class='ig-drop' id='ig-dropzone' onclick='triggerUpload()' ondrop='handleDrop(event)' ondragover='handleDragOver(event)' ondragleave='handleDragLeave(event)'><div class='ig-drop-icon'>\ud83d\udcc4</div><div class='ig-drop-text'><strong>Drop an invoice here</strong> or click to browse<br>PDF, PNG, JPG \u2014 auto-fills all fields via AI</div><input type='file' id='ig-file-input' class='ig-drop-input' accept='.pdf,.png,.jpg,.jpeg,.webp' onchange='handleFileChange(this)'></div>";}
function ren(){
  if(S.view==="pdf"){document.getElementById("ig-root").innerHTML="<div class='ig-pdf-wrap'><div class='ig-pdf-bar'><div><div class='ig-pdf-title'>Invoice ready</div><div class='ig-pdf-sub'>"+esc(S.pdfFilename)+"</div></div><div class='ig-pdf-actions'><button class='ig-back-btn' onclick=\"window._S.view='form';ren()\">\u2190 New Invoice</button><button class='ig-dl-btn' onclick='doDL()'>\u2193 Download PDF</button></div></div><iframe src='"+S.pdfUrl+"' class='ig-frame' title='Invoice Preview'></iframe></div>";return;}
  var co=CO.find(function(c){return c.id===S.companyId;});var total=calcT(),ready=isOK();
  var moH="";MO.forEach(function(m){moH+="<option"+(m===S.month?" selected":"")+">"+m+"</option>";});
  var coH="";CO.forEach(function(c){coH+="<button class='ig-co-btn"+(c.id===S.companyId?" active":"")+"' onclick=\"ss('companyId','"+c.id+"')\"><span class='ig-co-name'>"+c.name+"</span><span class='ig-co-sub'>"+c.lines[2]+" \xB7 <strong>"+AB[c.id]+"</strong></span></button>";});
  var prH="";if(co){prH="<div class='ig-preview'>";[co.name].concat(co.lines).concat(co.extra?[co.extra]:[]).concat(co.email?[co.email]:[]).forEach(function(l){prH+="<div class='ig-preview-line'>"+esc(l)+"</div>";});prH+="</div>";}
  var pmH="";PM.forEach(function(m){pmH+="<option"+(m===S.paymentMethod?" selected":"")+">"+esc(m)+"</option>";});
  var cnH="";CN.forEach(function(c){cnH+="<option"+(c===S.fromCountry?" selected":"")+">"+esc(c)+"</option>";});
  var payH=isKZ()?kzForm():fld("Payment Details","paymentDetails","e.g. IBAN, account number, Deel profile link\u2026",true,false);
  var curS=S.currency==="$";
  document.getElementById("ig-root").innerHTML=
  "<div class='ig-card'>"
  +"<div class='ig-badge'><span class='ig-badge-dot'></span>Invoice Generator</div>"
  +"<div class='ig-title'>New Invoice</div>"
  +"<div class='ig-sub'>Invoice #1 \xB7 Always</div>"
  +dropZone()
  +"<div class='ig-section-label'>Bill From</div>"
  +"<div class='ig-stack'>"
  +fld("Full Name","fromName","Full legal name",false,false)
  +fld("Address","fromAddress","Full address",false,false)
  +"<div class='ig-row'><div class='ig-field'><label>Country</label><select class='ig-select' onchange=\"ss('fromCountry',this.value)\">"+cnH+"</select></div><div class='flex2'>"+fld("Email","fromEmail","email@example.com",false,false)+"</div></div>"
  +fld("TAX / VAT ID","fromTaxId","e.g. GB123456789",true,false)
  +"<div class='ig-field'><label>Payment Method</label><select class='ig-select' onchange=\"ss('paymentMethod',this.value)\">"+pmH+"</select></div>"
  +payH
  +"</div>"
  +"<hr class='ig-divider'>"
  +"<div class='ig-section-label'>Bill To</div>"
  +"<div class='ig-stack'>"+coH+"</div>"+prH
  +"<hr class='ig-divider'>"
  +"<div class='ig-section-label'>Invoice Date</div>"
  +"<div class='ig-row'><select class='ig-select' onchange=\"ss('month',this.value)\">"+moH+"</select>"
  +"<input class='ig-input' placeholder='Day' value='"+esc(S.day)+"' maxlength='2' oninput=\"this.value=this.value.replace(/\\D/g,'');sf('day',this.value)\">"
  +"<input class='ig-input' placeholder='Year' value='"+esc(S.year)+"' maxlength='4' oninput=\"this.value=this.value.replace(/\\D/g,'');sf('year',this.value)\">"
  +"</div>"
  +"<hr class='ig-divider'>"
  +"<div class='ig-section-label'>Line Item</div>"
  +"<div class='ig-stack'>"
  +fld("Description","description","Service description",false,false)
  +"<div class='ig-row'><div>"+fld("Qty","quantity","1",false,true)+"</div>"
  +"<div style='flex:2;display:flex;flex-direction:column;gap:4px;'><span style='font-size:12px;color:#555;'>Amount</span>"
  +"<div style='display:flex;border:1.5px solid #E8E8E4;border-radius:10px;overflow:hidden;background:#FAFAF9;'>"
  +"<button onclick=\"sc('$')\" style='padding:10px 14px;background:"+(curS?"#111":"none")+";color:"+(curS?"#fff":"#888")+";border:none;cursor:pointer;font-size:14px;font-family:inherit;border-right:1px solid #E8E8E4;'>$</button>"
  +"<button onclick=\"sc('\u20AC')\" style='padding:10px 14px;background:"+(curS?"none":"#111")+";color:"+(curS?"#888":"#fff")+";border:none;cursor:pointer;font-size:14px;font-family:inherit;border-right:1px solid #E8E8E4;'>\u20AC</button>"
  +"<input style='border:none;outline:none;padding:10px 12px;font-size:14px;color:#111;background:transparent;font-family:inherit;width:100%;' placeholder='400' value='"+esc(S.unitCost)+"' oninput=\"this.value=this.value.replace(/[^0-9.]/g,'');sf('unitCost',this.value)\">"
  +"</div></div></div>"
  +"</div>"
  +"<div id='ig-total' class='ig-total-bar"+(total?" visible":"")+"'><span class='ig-total-label'>Total</span><span id='ig-tv' class='ig-total-value'>"+total+"</span></div>"
  +"<div id='ig-fnpreview' style='display:"+(ready&&total?"block":"none")+";margin-top:12px;padding:10px 14px;background:#F7F7F5;border-radius:8px;border:1px dashed #DDD;'><span style='color:#AAA;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;'>File name preview</span><br><span id='ig-fntext' style='color:#111;font-weight:500;margin-top:4px;display:block;font-size:12px;'>"+(ready&&total?esc(getFn()):"")+"</span></div>"
  +"<button id='ig-btn' class='ig-gen-btn' onclick='doGen()' "+(ready?"":"disabled")+">Generate Invoice \u2192</button>"
  +"</div>";
}
window.ren=ren;
(async function(){document.getElementById("ig-root").innerHTML="<div class='ig-loading-overlay'><div class='ig-spinner'></div><span style='font-size:13px;color:#888;'>Loading fonts...</span></div>";await loadFonts();ren();})();
</script>
</body>
</html>
